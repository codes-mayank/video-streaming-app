<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Streaming App - Player</title>
  <link href="https://vjs.zencdn.net/8.16.1/video-js.css" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .container {
      max-width: 960px;
      margin: 40px auto;
      padding: 0 16px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 16px;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: #1d4ed8;
    }

    .video-js {
      width: 100%;
      height: 540px;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Video.js HLS Player</h1>
    <div class="controls">
      <input
        id="hlsUrl"
        type="url"
        placeholder="Paste HLS master.m3u8 URL"
        value=""
      />
      <button id="loadBtn" type="button">Load Video</button>
    </div>

    <video
      id="videoPlayer"
      class="video-js vjs-default-skin"
      controls
      preload="auto"
      playsinline
      data-setup="{}"
    ></video>
  </main>

  <script src="https://vjs.zencdn.net/8.16.1/video.min.js"></script>
  <script>
    const player = videojs("videoPlayer");
    const urlInput = document.getElementById("hlsUrl");
    const loadBtn = document.getElementById("loadBtn");

    function loadVideo() {
      const src = (urlInput.value || "").trim();
      if (!src) {
        alert("Please provide an HLS .m3u8 URL.");
        return;
      }

      player.src({
        src,
        type: "application/x-mpegURL",
      });
      player.play().catch(() => {});
    }

    loadBtn.addEventListener("click", loadVideo);
    urlInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        loadVideo();
      }
    });
  </script>
</body>
</html>
