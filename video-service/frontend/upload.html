<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Upload</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f7fb; margin: 0; }
    .container { max-width: 720px; margin: 40px auto; background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,.08); }
    h1 { margin-top: 0; }
    label { display: block; margin: 12px 0 6px; font-weight: 600; }
    input, textarea, button { width: 100%; padding: 10px; box-sizing: border-box; }
    textarea { min-height: 90px; resize: vertical; }
    button { margin-top: 16px; background: #1d4ed8; color: #fff; border: 0; border-radius: 8px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { margin-top: 16px; padding: 10px; border-radius: 8px; background: #eef2ff; color: #1e3a8a; white-space: pre-wrap; }
    .error { background: #fef2f2; color: #991b1b; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Upload Video</h1>
    <p>This page uploads through the backend JSON API to avoid R2 CORS issues in browser.</p>

    <label for="title">Title</label>
    <input id="title" type="text" placeholder="Video title" required />

    <label for="description">Description</label>
    <textarea id="description" placeholder="Short description"></textarea>

    <label for="uploadedBy">Uploaded By (optional)</label>
    <input id="uploadedBy" type="text" placeholder="username or user id" />

    <label for="file">Video File</label>
    <input id="file" type="file" accept="video/*" required />

    <button id="uploadBtn">Upload Video</button>
    <div id="status" class="status">Ready.</div>
  </div>

  <script>
    const uploadBtn = document.getElementById("uploadBtn");
    const statusBox = document.getElementById("status");

    function setStatus(message, isError = false) {
      statusBox.textContent = message;
      statusBox.className = isError ? "status error" : "status";
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const value = String(reader.result || "");
          const commaIndex = value.indexOf(",");
          resolve(commaIndex >= 0 ? value.slice(commaIndex + 1) : value);
        };
        reader.onerror = () => reject(new Error("Failed to read file"));
        reader.readAsDataURL(file);
      });
    }

    async function uploadVideo() {
      const title = document.getElementById("title").value.trim();
      const description = document.getElementById("description").value.trim();
      const uploadedBy = document.getElementById("uploadedBy").value.trim();
      const fileInput = document.getElementById("file");
      const file = fileInput.files?.[0];

      if (!title) {
        setStatus("Title is required.", true);
        return;
      }
      if (!file) {
        setStatus("Please choose a video file.", true);
        return;
      }
      if (!file.type.startsWith("video/")) {
        setStatus("Only video files are allowed.", true);
        return;
      }

      uploadBtn.disabled = true;

      try {
        setStatus("Step 1/2: Converting file to JSON payload...");
        const fileBase64 = await fileToBase64(file);

        setStatus("Step 2/2: Uploading via backend...");
        const uploadRes = await fetch("/videos/upload-json", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            title,
            description: description || null,
            content_type: file.type,
            file_base64: fileBase64,
            uploaded_by: uploadedBy || null
          })
        });

        if (!uploadRes.ok) {
          const uploadText = await uploadRes.text();
          throw new Error("Upload failed: " + uploadText);
        }

        const completeData = await uploadRes.json();
        setStatus(
          "Upload complete!\n" +
          `Video ID: ${completeData.id}\n` +
          `Status: ${completeData.status}\n` +
          `Bucket: ${completeData.bucket || "(unknown)"}\n` +
          `File key: ${completeData.file_key || "(unknown)"}`
        );
      } catch (err) {
        setStatus(err.message || "Unexpected error during upload.", true);
      } finally {
        uploadBtn.disabled = false;
      }
    }

    uploadBtn.addEventListener("click", uploadVideo);
  </script>
</body>
</html>
