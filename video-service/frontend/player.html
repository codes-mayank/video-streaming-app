<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Library Player</title>
  <link href="https://vjs.zencdn.net/8.16.1/video-js.css" rel="stylesheet" />
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
    .container { max-width: 1100px; margin: 24px auto; padding: 0 16px; }
    h1 { margin: 0 0 16px; font-size: 26px; }
    .layout { display: grid; grid-template-columns: 330px 1fr; gap: 16px; }
    .panel { background: #111827; border: 1px solid #1f2937; border-radius: 10px; padding: 12px; }
    .toolbar { display: flex; gap: 8px; margin-bottom: 10px; }
    button {
      border: none; border-radius: 8px; padding: 8px 12px; cursor: pointer;
      background: #2563eb; color: #fff; font-weight: 600;
    }
    button:hover { background: #1d4ed8; }
    .hint { color: #94a3b8; font-size: 13px; margin-bottom: 8px; }
    .videos { max-height: 600px; overflow: auto; display: flex; flex-direction: column; gap: 8px; }
    .video-item {
      text-align: left; background: #1f2937; color: #e5e7eb; border: 1px solid #374151;
      border-radius: 8px; padding: 10px;
    }
    .video-item:hover { background: #273449; }
    .video-item.active { border-color: #60a5fa; background: #22324a; }
    .video-title { font-size: 14px; font-weight: 700; }
    .video-meta { font-size: 12px; color: #94a3b8; margin-top: 4px; }
    .status { margin-top: 8px; color: #fda4af; min-height: 20px; font-size: 13px; }
    .video-js { width: 100%; height: 620px; border-radius: 8px; overflow: hidden; }
    .now-playing { margin-top: 8px; color: #93c5fd; font-size: 14px; min-height: 20px; }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .video-js { height: 360px; }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Video Library</h1>
    <div class="layout">
      <section class="panel">
        <div class="toolbar">
          <button id="refreshBtn" type="button">Refresh</button>
          <select id="qualitySelect" aria-label="Video quality">
            <option value="auto">Quality: Auto</option>
          </select>
        </div>
        <p class="hint">Click a video to start playback from Cloudflare R2.</p>
        <div id="videos" class="videos"></div>
        <div id="status" class="status"></div>
      </section>

      <section class="panel">
        <video id="videoPlayer" class="video-js vjs-default-skin" controls preload="auto" playsinline></video>
        <div id="nowPlaying" class="now-playing">No video selected.</div>
      </section>
    </div>
  </main>

<script src="https://vjs.zencdn.net/8.16.1/video.min.js"></script>
<script src="https://unpkg.com/videojs-contrib-quality-levels@3.0.0/dist/videojs-contrib-quality-levels.min.js"></script>
  <script>
    const player = videojs("videoPlayer");
    const videosEl = document.getElementById("videos");
    const statusEl = document.getElementById("status");
    const refreshBtn = document.getElementById("refreshBtn");
    const qualitySelect = document.getElementById("qualitySelect");
    const nowPlayingEl = document.getElementById("nowPlaying");
    let qualityLevelsRef = null;

    function resetQualityOptions() {
      qualitySelect.innerHTML = '<option value="auto">Quality: Auto</option>';
      qualitySelect.value = "auto";
      qualitySelect.disabled = true;
    }

    function qualityLabel(level, index) {
      if (level.height) return `${level.height}p`;
      if (level.width) return `${level.width}w`;
      return `Level ${index + 1}`;
    }

    function applyQuality(value) {
      if (!qualityLevelsRef) return;
      for (let i = 0; i < qualityLevelsRef.length; i += 1) {
        const level = qualityLevelsRef[i];
        level.enabled = value === "auto" || String(i) === value;
      }
    }

    function syncQualityOptions() {
      if (!qualityLevelsRef) return;
      const entries = [];
      for (let i = 0; i < qualityLevelsRef.length; i += 1) {
        const level = qualityLevelsRef[i];
        entries.push({ index: i, height: level.height || 0, bitrate: level.bitrate || 0 });
      }
      if (!entries.length) {
        resetQualityOptions();
        return;
      }

      entries.sort((a, b) => (b.height - a.height) || (b.bitrate - a.bitrate));
      const selected = qualitySelect.value || "auto";
      qualitySelect.innerHTML = '<option value="auto">Quality: Auto</option>';
      for (const entry of entries) {
        const option = document.createElement("option");
        option.value = String(entry.index);
        option.textContent = qualityLabel(qualityLevelsRef[entry.index], entry.index);
        qualitySelect.appendChild(option);
      }
      qualitySelect.disabled = false;
      qualitySelect.value = entries.some((e) => String(e.index) === selected) ? selected : "auto";
      applyQuality(qualitySelect.value);
    }

    player.ready(() => {
      if (typeof player.qualityLevels !== "function") {
        setStatus("Quality switching unavailable: quality levels plugin failed to load.");
        return;
      }
      qualityLevelsRef = player.qualityLevels();
      resetQualityOptions();
      qualityLevelsRef.on("addqualitylevel", syncQualityOptions);
      player.on("loadedmetadata", syncQualityOptions);
      player.on("emptied", resetQualityOptions);
    });

    function setStatus(message) {
      statusEl.textContent = message || "";
    }

    function formatDate(isoString) {
      if (!isoString) return "-";
      const d = new Date(isoString);
      if (Number.isNaN(d.getTime())) return "-";
      return d.toLocaleString();
    }

    function getPlayableSource(video) {
      if (!video.playback_url) return null;
      const url = video.playback_url;
      const lower = url.toLowerCase();
      if (lower.includes(".m3u8")) {
        return { src: url, type: "application/x-mpegURL" };
      }
      if (lower.includes(".mp4")) {
        return { src: url, type: "video/mp4" };
      }
      if (lower.includes(".webm")) {
        return { src: url, type: "video/webm" };
      }
      if (video.content_type && video.content_type.startsWith("video/")) {
        return { src: url, type: video.content_type };
      }
      return { src: url };
    }

    function playVideo(video) {
      const source = getPlayableSource(video);
      if (!source) {
        setStatus(
          "No playback URL for this video. Ensure the bucket/object is publicly readable and that transcoding has produced hls_master_key."
        );
        return;
      }
      setStatus("");
      nowPlayingEl.textContent = `Now playing: ${video.title} (ID: ${video.id})`;
      player.src(source);
      resetQualityOptions();
      player.play().catch(() => {});
    }

    function renderVideos(items) {
      videosEl.innerHTML = "";
      if (!items.length) {
        videosEl.innerHTML = '<div class="hint">No videos found.</div>';
        return;
      }

      for (const video of items) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "video-item";
        btn.innerHTML =
          `<div class="video-title">${video.title || "(untitled)"}<\/div>` +
          `<div class="video-meta">ID: ${video.id} | Status: ${video.status}<\/div>` +
          `<div class="video-meta">Updated: ${formatDate(video.updated_at)}<\/div>`;
        btn.addEventListener("click", () => {
          document.querySelectorAll(".video-item.active").forEach((el) => el.classList.remove("active"));
          btn.classList.add("active");
          playVideo(video);
        });
        videosEl.appendChild(btn);
      }
    }

    async function loadVideos() {
      setStatus("Loading videos...");
      try {
        const res = await fetch("/videos?limit=100");
        if (!res.ok) {
          throw new Error(`Failed to load videos (${res.status})`);
        }
        const data = await res.json();
        renderVideos(data.items || []);
        setStatus("");
      } catch (err) {
        setStatus(err.message || "Unable to load videos.");
      }
    }

    refreshBtn.addEventListener("click", loadVideos);
    qualitySelect.addEventListener("change", (event) => {
      applyQuality(event.target.value);
    });
    resetQualityOptions();
    loadVideos();
  </script>
</body>
</html>
